<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <title>Document</title>
</head>
<body>
    <br><br>
<div class="wrapper">
    <div id="ball1"></div>
    <div id="ball2"></div>
    <div id="ball3"></div>
</div>  
<script>
    class Ball{
        constructor(ball, xAxis){

this.ball = document.getElementById(ball);
this.posY = 0;
    this.velocity = 0;
    this.gravity = 0.8;
    this.bounce = .9;
    this.floor = 380;
    this.xAxis = xAxis;
    this.ball.style.left = this.xAxis + "px";
        }
    bounceBall = () => {
        this.velocity += this.gravity;
        this.posY += this.velocity;
        if(this.posY >= this.floor){
            this.posY = this.floor;
            this.velocity *=-this.bounce;
        }
        this.ball.style.top = this.posY + "px";
        requestAnimationFrame(this.bounceBall);
        return;
    }
        
    }
    const ball1 = new Ball("ball1", 100);
    const ball2 = new Ball("ball2", 200);
    const ball3 = new Ball("ball3", 300);
    ball1.gravity = 1.4;
    ball1.bounceBall();
    ball2.bounce = 0.6;
    ball2.bounceBall();
    ball3.bounceBall();
</script>  
</body>
</html>
